defaults:
  - base
  - _self_

_target_: imitation.algos.encoders.otter_3d.OTTER3DEncoder
clip_model: "ViT-L/14"
pointcloud_extractor_factory:
  _target_: imitation.algos.utils.pointnet_extractor.PointNetEncoder
  _partial_: true
  out_channels: ${algo.embed_dim}
  use_layernorm: false
  final_norm: "none"
  block_channel: [256, 256, 256, 512]
  reduction: attention
lowdim_encoder_factory:
  _target_: imitation.algos.utils.mlp_proj.MLPProj
  _partial_: true
  output_size: ${algo.lowdim_embed_dim}
  num_layers: 1
num_points: 512
hidden_dim: 60
task_suite_name: ${task.suite_name}
task_benchmark_name: ${task.benchmark_name}
hand_frame: true
do_crop: true
tight_crop: true
do_hand_crop: true
downsample_mode: feat
xyz_proj_type: nerf
do_pos: true
do_lang: true
do_rgb: false
temperature: 0.07

load_image: true
load_depth: true 
task_embedding_format: lang