defaults:
  - task: libero
  - algo: fm_policy_dice_S
  - _self_

exp_name: fm_dice
variant_name: null
seed: 10000
device: cuda:0
output_prefix: /storage/scratch1/8/lwang831/imitation/experiments_dice
data_prefix: ./data
make_unique_experiment_dir: false
logging_folder: dice
normalize_action: true
normalize_obs: false

# Path to BC cold-start checkpoint (.pth). The encoder + FM are frozen.
cold_start_checkpoint: ???
# Single-task default; set task_indices to a list for multi-task.
task_index: 0
task_indices: null

dice:
  # Outer-loop knobs.
  n_iters: 50
  episodes_per_iter: 4         # online rollouts collected per outer iter
  warmup_episodes: 20          # teacher rollouts before any RL update; seeds the replay
  gradient_steps: 200          # actor/critic/Polyak steps per outer iter (official: 10/env step, we batch)
  eval_interval: 5
  save_interval: 10
  max_episode_length: ${task.horizon}

  # Replay.
  replay_size: 50000           # CPU-side; per-row ~ cond + noise + action + ... ~ 50kB
  batch_size: 256

  # Model network sizes.
  actor_hidden: [1024, 1024, 1024]    # official robomimic config
  critic_hidden: [1024, 1024, 1024]   # official robomimic config
  ensemble_size: 10                   # official: 10 for reduced overestimation bias
  q_depends_on_noise: false           # official default: Q(s, a)
  conservative: min                   # min | lcb | mean
  lcb_kappa: 0.1
  td_loss: mse                        # official robomimic config: mse (also supports huber|bce)
  zero_final_layer: true              # LIBERO opt-in: residual exactly 0 at iter 0

  # Loss coefficients.
  bc_loss_weight: 100.0        # official README recommends 50-100
  critic_weight: 1.0

  # Multi-z (actor + optional target).
  num_multi_z: 16              # official robomimic config uses 16 noise samples in actor_loss
  multi_sample_next_noise: true
  num_next_noise_samples: 4    # official default

  # Q-filtering / self-imitation (active after q_filtering_warmup_steps).
  use_soft_q_filtering: false  # official sets false in robomimic config; we keep the same default
  q_filtering_warmup_steps: 2000
  q_underestimation_threshold: -0.5
  replay_flow_warmup_steps: 4000

  # Q-normalization.
  use_q_normalization: true    # official: "this has to be true"

  # N-step returns (KEY for sparse-reward credit assignment).
  use_n_step: true
  n_step: 3

  # Q-overestimation logging (required for soft Q-filtering, cheap otherwise).
  log_q_overestimation: true

  # Data-source masks (official robomimic configs: disable_q_loss true,
  # always_retain_bc true; only meaningful when use_rlpd=true).
  disable_q_loss_for_expert_data: false
  disable_td_loss_for_expert_data: false
  always_retain_bc_loss_for_expert_data: false

  # RLPD expert mixing. When use_rlpd=true, the BC demos of this run's
  # task_indices are encoded through the frozen BC encoder into a frozen
  # expert buffer and mixed into every minibatch at expert_ratio (or the
  # adaptive linear schedule below, counted in gradient steps).
  use_rlpd: false
  expert_ratio: 0.3
  use_adaptive_expert_ratio: true
  adaptive_expert_ratio_start: 0.5
  adaptive_expert_ratio_end: 0.1
  adaptive_expert_ratio_steps: 16000

  # Exploration.
  online_explore_strategy: "max_q_min"   # official robomimic config
  num_exploration_samples: 16

  # Optimization (official defaults).
  actor_lr: 1.0e-4
  critic_lr: 1.0e-4
  actor_weight_decay: 1.0e-5
  critic_weight_decay: 1.0e-5
  grad_clip: 1.0
  gamma: 0.99
  tau: 0.01                    # official robomimic config
  clip_action: false           # matches official sim repo: NO internal clamp.
                               # collector + env-eval wrapper clamp at env boundary.

  # Delayed updates.
  actor_update_freq: 2         # official robomimic config: actor every 2 steps
  critic_target_update_freq: 2

  # ReinFlow-style learnable bounded noise head (Phase 1+). Default OFF — the
  # FM K=10 runs are unaffected. For K=1 drift the noise->action map collapses
  # across noises, starving max_q_* exploration. Enabling this routes
  # collection through `student.get_collection_action(state)` which executes
  #   a_exec = clamp(mu + sigma_s(state) * eps, -1, 1),
  # where mu = a_teacher + residual (the deterministic 1-step action) and
  # sigma_s is bounded in [noise_sigma_min, noise_sigma_max] via sigmoid.
  # Pick the bounds from the Phase 0 measurement (per-dim FM std at K=10).
  # Phase 1 leaves the head untrained (no optimizer); Phase 2 will add it.
  use_noise_head: false
  noise_sigma_min: 0.01
  noise_sigma_max: 0.1
  noise_head_hidden: 256
  noise_head_initial_logit: 0.0   # sigmoid(0)=0.5 -> sigma_s starts at midpoint

  # CQL-style conservative critic penalty (Step 2, off by default).
  # When > 0, adds
  #   cql_weight * ( mean Q(s,z,a_student) - mean Q(s,z,a_data) )
  # to critic_loss. Pushes Q DOWN at the policy's own actions and UP at the
  # buffer's data actions. Designed to fight the monotonic Q-level inflation
  # observed on long-horizon DICE z-cond runs (Q drifts -0.81 -> +0.41 with
  # essentially-unchanged residual). Use 1.0 as a starting point; raise to
  # 5-10 if Q inflation is severe, drop below 1 if the critic underfits.
  cql_weight: 0.0

  # GRD coverage repulsion across the K multi-z action samples (off by default).
  # DICE's -Q term collapses all K samples onto the Q-argmax -- the thin K=1 drift
  # noise->action map that kills the max_q eval gain channel. This adds an isolated
  # SVGD/GRD repulsion kernel pushing the K per-state samples apart; with -Q it
  # forms an SVGD drift update using the LEARNED Q as the energy. Watch
  # train/action_dispersion (RMS pairwise spread): drift BC ~0.043, FM ~0.021.
  # repel_weight=0 -> exact original DICE. Sweep ~{0.5, 1.0, 2.0}.
  repel_weight: 0.0
  repel_bandwidth_scale: 1.0   # RBF bandwidth = median pairwise dist * this

  # In-loop eval action selection. "single" = one noise draw (~BC; CANNOT exploit
  # dispersion). A max_q_* strategy draws eval_num_samples noise vectors and keeps
  # the best by the Q-ensemble -- the gain channel that turns fattened dispersion
  # into eval success. Use max_q_min when testing the repulsion fix.
  eval_strategy: single        # single | max_q_min | max_q_std | max_q_std_filtered_by_min
  eval_num_samples: 10

# Consumed by env_runner interpolation (used for eval).
rollout:
  enabled: true
  interval: ${dice.eval_interval}
  rollouts_per_env: 20
  max_episode_length: ${task.horizon}
  num_parallel_envs: 1
  n_video: 0

training:
  load_obs: false
  use_tqdm: true

logging:
  group: null
  mode: online
  project: cleanup-dice
  resume: false
  save_code: false
